name: Deploy Functions to Azure
 
on:
  push:
    branches:
      - main
    paths:
      - 'src/SpeakerPipeline.Hosting.Functions/**'
      - 'src/SpeakerPipeline.Agents.Scoring/**'
      - 'src/SpeakerPipeline.Core/**'
      - 'infra/functions.settings.json'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:
 
env:
  AZURE_FUNCTIONAPP_NAME: func-speakerpipeline-dev
  AZURE_RESOURCE_GROUP: rg-speakerpipeline-dev
  AZURE_FUNCTIONAPP_PACKAGE_PATH: './publish'
  DOTNET_VERSION: '10.0.x'
  PROJECT_PATH: src/SpeakerPipeline.Hosting.Functions/SpeakerPipeline.Hosting.Functions.csproj
 
permissions:
  id-token: write
  contents: read
 
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: 'ga'
 
      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}
 
      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore
 
      - name: Run scoring agent tests
        run: dotnet test tests/SpeakerPipeline.Agents.Scoring.Tests/SpeakerPipeline.Agents.Scoring.Tests.csproj --configuration Release --verbosity normal
 
      - name: Run evals (informational, non-blocking)
        run: dotnet test tests/SpeakerPipeline.Agents.Scoring.Evals/SpeakerPipeline.Agents.Scoring.Evals.csproj --configuration Release --verbosity normal
        continue-on-error: true
 
      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --no-build --output ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
 
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}

      # Runtime config, applied additively (az ... set merges, preserving the
      # host's AzureWebJobsStorage / App Insights settings). Split in two:
      #   1. Non-sensitive settings from the committed file (providers, models,
      #      search queries, feature flags).
      #   2. Env-specific identifiers from GitHub Secrets — never committed to
      #      this public repo. Key Vault refs are built from the KEYVAULT_URI
      #      secret so the vault name isn't in the repo either.
      # This lives here, not in Bicep, because ARM cannot read and write the same
      # appsettings resource in one deployment (circular).
      - name: Configure app settings (non-sensitive)
        run: |
          az functionapp config appsettings set \
            -g "$AZURE_RESOURCE_GROUP" -n "$AZURE_FUNCTIONAPP_NAME" \
            --settings @infra/functions.settings.json \
            --output none

      - name: Configure app settings (from secrets)
        env:
          KV: ${{ secrets.KEYVAULT_URI }}
          FUNCTIONS_MI_CLIENT_ID: ${{ secrets.FUNCTIONS_MI_CLIENT_ID }}
          FOUNDRY_ENDPOINT: ${{ secrets.FOUNDRY_ENDPOINT }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_SCOPE: ${{ secrets.API_SCOPE }}
          NOTIFY_TENANT_ID: ${{ secrets.NOTIFY_TENANT_ID }}
          NOTIFY_CLIENT_ID: ${{ secrets.NOTIFY_CLIENT_ID }}
        run: |
          set -euo pipefail
          required=(KV FUNCTIONS_MI_CLIENT_ID FOUNDRY_ENDPOINT API_BASE_URL API_SCOPE NOTIFY_TENANT_ID NOTIFY_CLIENT_ID)
          for v in "${required[@]}"; do
            if [ -z "${!v:-}" ]; then
              echo "::error::Missing required GitHub Secret: ${v}"
              exit 1
            fi
          done

          az functionapp config appsettings set \
            -g "$AZURE_RESOURCE_GROUP" -n "$AZURE_FUNCTIONAPP_NAME" --output none \
            --settings \
              AZURE_CLIENT_ID="$FUNCTIONS_MI_CLIENT_ID" \
              ScoringAgent__Endpoint="$FOUNDRY_ENDPOINT" \
              Discovery__Endpoint="$FOUNDRY_ENDPOINT" \
              SpeakerPipelineApi__BaseUrl="$API_BASE_URL" \
              SpeakerPipelineApi__Scope="$API_SCOPE" \
              Notifications__Email__TenantId="$NOTIFY_TENANT_ID" \
              Notifications__Email__ClientId="$NOTIFY_CLIENT_ID" \
              Search__ApiKey="@Microsoft.KeyVault(SecretUri=${KV}/secrets/search-google-apikey)" \
              Search__Cx="@Microsoft.KeyVault(SecretUri=${KV}/secrets/search-google-cx)" \
              Notifications__Email__ClientSecret="@Microsoft.KeyVault(SecretUri=${KV}/secrets/notify-graph-clientsecret)" \
              Notifications__Email__Sender="@Microsoft.KeyVault(SecretUri=${KV}/secrets/notify-graph-sender)" \
              Notifications__Email__Recipient="@Microsoft.KeyVault(SecretUri=${KV}/secrets/notify-graph-recipient)"

      # A deployed package can still register zero functions if the host fails to
      # start or index. Poll until both expected functions show up, and fail the
      # job if they never do — the check a green deploy alone does not give you.
      - name: Smoke test — functions registered
        run: |
          set -euo pipefail
          echo "Waiting for the host to index functions..."
          for attempt in $(seq 1 12); do
            names=$(az functionapp function list -g "$AZURE_RESOURCE_GROUP" -n "$AZURE_FUNCTIONAPP_NAME" --query "[].name" -o tsv 2>/dev/null || true)
            echo "attempt ${attempt}: [${names//$'\n'/, }]"
            if echo "$names" | grep -Eq "(^|/)ScoringAgentHttpTrigger$" \
              && echo "$names" | grep -Eq "(^|/)ScoringAgentTimerTrigger$" \
              && echo "$names" | grep -Eq "(^|/)TrackerMaintenanceHttpTrigger$" \
              && echo "$names" | grep -Eq "(^|/)TrackerMaintenanceTimerTrigger$" \
              && echo "$names" | grep -Eq "(^|/)DiscoveryHttpTrigger$" \
              && echo "$names" | grep -Eq "(^|/)DiscoveryTimerTrigger$"; then
              exit 0
            fi
            sleep 15
          done
          echo "::error::Expected functions (ScoringAgent, TrackerMaintenance, Discovery {Http,Timer}Trigger) not registered after deploy."
          exit 1

      - name: Azure logout
        if: always()
        run: az logout
        
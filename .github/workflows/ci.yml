name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  markdown-lint:
    name: Lint markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli@0.41.0

      - name: Lint markdown
        run: markdownlint "**/*.md" --ignore node_modules --ignore LICENSE --ignore NOTICE

  validate-samples:
    name: Validate sample JSON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate JSON parses
        run: |
          python -c "
          import json, sys, pathlib
          failed = False
          for p in pathlib.Path('samples').glob('*.json'):
              try:
                  json.loads(p.read_text())
                  print(f'ok  {p}')
              except json.JSONDecodeError as e:
                  print(f'FAIL {p}: {e}', file=sys.stderr)
                  failed = True
          sys.exit(1 if failed else 0)
          "

  build-and-test:
    name: Build and test .NET solution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore SpeakerPipeline.slnx

      - name: Build
        run: dotnet build SpeakerPipeline.slnx --configuration Release --no-restore

      - name: Unit tests
        run: |
          dotnet test tests/SpeakerPipeline.Core.Tests              --configuration Release --no-build --logger "trx;LogFileName=core.trx"
          dotnet test tests/SpeakerPipeline.Storage.Tests           --configuration Release --no-build --logger "trx;LogFileName=storage.trx"
          dotnet test tests/SpeakerPipeline.Api.Tests               --configuration Release --no-build --logger "trx;LogFileName=api.trx"
          dotnet test tests/SpeakerPipeline.Agents.Scoring.Tests    --configuration Release --no-build --logger "trx;LogFileName=agent.trx"

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: "**/TestResults/*.trx"

  evals:
    name: Scoring-agent eval suite
    runs-on: ubuntu-latest
    needs: build-and-test
    # NOTE: failing evals do NOT fail the build today. The runner writes an
    # evals-report.json artifact and surfaces drift via xUnit's standard
    # output. Flip continue-on-error to false once the golden set is stable
    # and we want hard CI failure on drift. See tests/SpeakerPipeline.Agents.Scoring.Evals/README.md.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore SpeakerPipeline.slnx

      - name: Build evals
        run: dotnet build tests/SpeakerPipeline.Agents.Scoring.Evals --configuration Release --no-restore

      - name: Run evals
        run: dotnet test tests/SpeakerPipeline.Agents.Scoring.Evals --configuration Release --no-build --logger "trx;LogFileName=evals.trx"

      - name: Upload evals report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evals-report
          path: |
            tests/SpeakerPipeline.Agents.Scoring.Evals/bin/Release/net10.0/evals-report.json
            **/TestResults/evals.trx

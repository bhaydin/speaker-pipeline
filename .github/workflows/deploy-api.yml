name: Deploy API to Azure
 
on:
  push:
    branches:
      - main
    paths:
      - 'src/SpeakerPipeline.Api/**'
      - 'src/SpeakerPipeline.Core/**'
      - 'src/SpeakerPipeline.Storage/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:
 
env:
  AZURE_WEBAPP_NAME: app-speakerpipeline-api-dev
  AZURE_RESOURCE_GROUP: rg-speakerpipeline-dev
  AZURE_WEBAPP_PACKAGE_PATH: './publish'
  DOTNET_VERSION: '10.0.x'
  PROJECT_PATH: src/SpeakerPipeline.Api/SpeakerPipeline.Api.csproj
 
permissions:
  id-token: write
  contents: read
 
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: 'ga'
 
      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}
 
      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore
 
      - name: Run unit tests
        run: dotnet test tests/SpeakerPipeline.Api.Tests/SpeakerPipeline.Api.Tests.csproj --configuration Release --verbosity normal
 
      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --no-build --output ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
 
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
 
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

      # A green deploy only means Azure accepted the package. Prove the app
      # actually serves: poll /health through the cold-start window and fail the
      # job on non-200. This is what would have caught the JwtBearer misconfig
      # that left the app booting green but 500ing every request.
      - name: Smoke test — API /health
        run: |
          set -euo pipefail
          host=$(az webapp show -g "$AZURE_RESOURCE_GROUP" -n "$AZURE_WEBAPP_NAME" --query defaultHostName -o tsv)
          url="https://${host}/health"
          echo "Probing $url"
          for attempt in $(seq 1 12); do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 20 "$url" || echo 000)
            echo "attempt ${attempt}: HTTP ${code}"
            if [ "$code" = "200" ]; then
              echo "API is healthy."
              exit 0
            fi
            sleep 10
          done
          echo "::error::API /health did not return 200 within the warm-up window."
          exit 1

      - name: Azure logout
        if: always()
        run: az logout
        